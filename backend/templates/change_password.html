<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Change Password - Stu Track</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='change_password.css') }}">
</head>

<body>
  <div class="main-wrapper">
    <div class="panel">
      <div class="panel-header">
        <h2>Change Password</h2>
      </div>
      <div class="panel-body">
        <p class="instruction-text">Since this is your first login, please set a new password for your account.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            <span>{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth_bp.change_password') }}" class="professional-form">
          <div class="form-group">
            <label for="new_password">New Password</label>
            <div class="input-container">
              <input type="password" id="new_password" name="new_password" class="form-control" required
                placeholder="Choose a strong password" />
              <span class="toggle-icon" id="toggleNewPassword">
                <i class="fa-solid fa-eye-slash"></i>
              </span>
            </div>
            <div id="strength-meter" class="strength-meter">
              <div class="meter-bar"></div>
              <span id="strength-text">Password Strength</span>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <div class="input-container">
              <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
                placeholder="Repeat your new password">
              <span class="toggle-icon" id="toggleConfirmPassword">
                <i class="fa-solid fa-eye-slash"></i>
              </span>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
  <script src="{{ url_for('static', filename='change_password.js') }}"></script>
</body>

</html>
