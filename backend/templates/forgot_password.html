<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Stu Track</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='forgot_password.css') }}">
</head>

<body style="--logo-url: url('{{ url_for('static', filename='logo.png') }}');">
  <div class="auth-container">
    <div class="forgot-box">
      <!-- Logo inside the box -->
      <div class="logo-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="StuTrack Logo" class="box-logo">
      </div>

      <h1>Password Reset</h1>
      <h2>Enter your email to continue</h2>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth_bp.forgot_password') }}">
        <div class="form-group">
          <label for="identifier">Email Address</label>
          <input type="email" name="identifier" id="identifier" placeholder="e.g. yourname@example.com" required>
        </div>

        <button type="submit">Send Reset Link</button>
      </form>

      <div class="extra-links">
        <a href="{{ url_for('auth_bp.login') }}">Back to Login</a>
      </div>
    </div>
  </div>

  <!-- Keep any previously linked JS file if it exists -->
  <script src="{{ url_for('static', filename='forgot_password.js') }}"></script>
</body>

</html>
