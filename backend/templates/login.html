<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin/ Student- Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}" />
  <script src="{{ url_for('static', filename='login.js') }}" defer></script>
</head>

<body style="--logo-url: url('{{ url_for('static', filename='logo.png') }}');">
  <div class="login-container">
    <div class="login-box">
      <div class="logo-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="login-logo">
      </div>
      <h1>Admin/Student</h1>
      <h2>Login</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <p class="alert alert-{{ category }}">{{ message }}</p>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth_bp.login') }}" autocomplete="off" novalidate>
        <label for="username">User ID</label>
        <input type="text" id="username" name="username" placeholder="Enter your User ID" autocomplete="off" required />

        <label for="password">Password</label>
        <div class="password-group">
          <!-- Using new-password is a common trick to prevent browser autofilling saved login credentials -->
          <input type="password" id="password" name="password" placeholder="At least 6 characters"
            autocomplete="new-password" required />
          <button type="button" id="togglePassword">👁️</button>
        </div>

        <button type="submit">Sign In</button>
      </form>
      <p><a href="{{ url_for('auth_bp.forgot_password') }}">Forgot password?</a></p>

    </div>
  </div>
</body>

</html>
